name: Daily Content

on:
  schedule:
    - cron: "0 10 * * *" # 10:00 UTC daily (~03:00 Mountain Time)
  workflow_dispatch: {} # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk

      - name: Generate today's content
        run: node scripts/generate-daily.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily/
          git diff --staged --quiet || git commit -m "daily content: $(date -u +%Y-%m-%d)"
          git push
